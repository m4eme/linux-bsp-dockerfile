version: '2.3'
services:
    petalinux:
      tty: true
      volumes:
          - '/opt:/opt'
          - '/home/${USER}:/home/mathworks'
          - '/local:/local'
      image: adi_petalinux:2021.2
      build: 
        context: .
        args:
          PUID: ${DOCKER_UID} 
          PGID: ${GID:-101}
